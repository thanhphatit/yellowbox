<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yellowbox Binary Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; color: #94A3B8; }
        .bg-grid { background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px); background-size: 30px 30px; }
        .glass-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.3s ease; }
        .glass-card:hover { border-color: rgba(59, 130, 246, 0.5); transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-grid min-h-screen pb-20">
    <nav class="border-b border-white/5 bg-[#0F172A]/80 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-blue-600 to-indigo-500 flex items-center justify-center text-white shadow-lg shadow-blue-500/20">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <span class="text-xl font-bold text-white tracking-tight">Yellowbox <span class="text-blue-500 font-medium">Binaries</span></span>
            </div>
            <a href="../" class="text-sm font-medium hover:text-white transition-colors bg-white/5 px-4 py-2 rounded-lg border border-white/5">Back to Hub</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="mb-12">
            <h1 class="text-4xl font-extrabold text-white mb-4 tracking-tight">Binary Distribution Center</h1>
            <p class="text-slate-400 text-lg max-w-2xl">Automated repository for pre-compiled CLI tools. Select a suite or install individual components with a single command.</p>
        </div>

        <div class="mb-10 relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-slate-500 group-focus-within:text-blue-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <input type="text" id="searchInput" placeholder="Search by tool name or component..." 
                   class="w-full bg-slate-800/50 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all">
        </div>

        <div class="mb-6 flex items-center justify-between">
            <span class="text-sm text-slate-500">Found <span id="toolCount" class="text-blue-400 font-bold">0</span> tools</span>
            <span id="lastUpdated" class="text-[10px] uppercase tracking-widest text-slate-600 font-bold">Last update: --</span>
        </div>

        <div id="tool-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass-card rounded-3xl p-8 animate-pulse h-64"></div>
            <div class="glass-card rounded-3xl p-8 animate-pulse h-64"></div>
        </div>
    </main>

    <script>
        const BASE_DOMAIN = "https://yellowbox.itblognote.com";
        let allTools = [];

        function copy(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const original = btn.innerHTML;
                btn.innerHTML = `<svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
                setTimeout(() => btn.innerHTML = original, 2000);
            });
        }

        function render(tools) {
            const grid = document.getElementById('tool-grid');
            const count = document.getElementById('tool-count');
            grid.innerHTML = '';
            document.getElementById('toolCount').innerText = tools.length;

            tools.forEach((tool, idx) => {
                const platforms = Object.keys(tool.platforms);
                const files = tool.platforms['linux-amd64'] || Object.values(tool.platforms)[0] || [];
                const isSuite = files.length > 1;

                const card = document.createElement('div');
                card.className = 'glass-card rounded-3xl p-8 flex flex-col';
                
                let fileList = '';
                if (isSuite) {
                    fileList = `
                        <div class="mt-6 pt-6 border-t border-white/5">
                            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Components</p>
                            <div class="space-y-3">
                                ${files.map(f => `
                                    <div class="flex items-center justify-between group/file">
                                        <span class="font-mono text-sm text-slate-400">${f}</span>
                                        <button onclick="copy('curl -sSL ${BASE_DOMAIN}/scripts/install.sh | bash -s -- ${tool.name} ${f}', this)" 
                                                class="text-[10px] text-slate-500 hover:text-blue-400 transition-colors flex items-center">
                                            <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                            Copy Cmd
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex items-start justify-between mb-6">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center border border-white/10 shadow-inner">
                                <span class="text-white font-bold text-xl">${tool.name.charAt(0).toUpperCase()}</span>
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-white tracking-tight">${tool.name}</h3>
                                <div class="flex gap-2 mt-1">
                                    ${isSuite ? '<span class="text-[10px] font-bold text-indigo-400 bg-indigo-400/10 px-2 py-0.5 rounded border border-indigo-400/20 uppercase tracking-widest">Suite</span>' : ''}
                                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">${platforms.length} Platforms</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex-grow">
                        <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Install Command</p>
                        <div class="bg-black/40 border border-white/5 rounded-xl p-3 flex items-center justify-between group">
                            <code class="font-mono text-xs text-blue-400 truncate no-scrollbar">curl -sSL ${BASE_DOMAIN}/scripts/install.sh | bash -s -- ${tool.name}</code>
                            <button onclick="copy('curl -sSL ${BASE_DOMAIN}/scripts/install.sh | bash -s -- ${tool.name}', this)" 
                                    class="ml-3 p-2 rounded-lg bg-white/5 hover:bg-white/10 text-slate-400 hover:text-white transition-all shrink-0">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            </button>
                        </div>
                    </div>

                    ${fileList}
                `;
                grid.appendChild(card);
            });
        }

        async function init() {
            try {
                const res = await fetch('manifest.json');
                const data = await res.json();
                allTools = data.tools;
                document.getElementById('lastUpdated').innerText = `Last update: ${new Date(data.lastUpdated).toLocaleString()}`;
                render(allTools);
            } catch (e) {
                document.getElementById('tool-grid').innerHTML = '<div class="col-span-full text-center py-20 text-rose-400">Failed to load tools. Action required.</div>';
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allTools.filter(t => 
                t.name.toLowerCase().includes(query) || 
                Object.values(t.platforms).flat().some(f => f.toLowerCase().includes(query))
            );
            render(filtered);
        });

        init();
    </script>
</body>
</html>
