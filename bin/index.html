<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yellowbox Binary Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0B1120; color: #94A3B8; }
        .font-mono { font-family: 'Fira Code', monospace; }
        .bg-grid { background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px); background-size: 24px 24px; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-grid min-h-screen relative">
    
    <div class="absolute top-0 inset-x-0 h-96 bg-gradient-to-b from-blue-900/20 to-transparent pointer-events-none"></div>

    <nav class="border-b border-white/5 glass sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <span class="text-xl font-bold text-white">Yellowbox <span class="text-slate-500 font-medium hidden sm:inline">| Binary Hub</span></span>
            </div>
            <a href="../" class="text-sm font-medium hover:text-white transition bg-white/5 px-4 py-2 rounded-full border border-white/5 hover:bg-white/10">&larr; Back to Main Hub</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12 relative z-10">
        <header class="mb-12">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400 mb-4">CLI Tools Distribution</h1>
            <p class="text-slate-400 max-w-2xl text-lg">
                Pre-compiled binaries for your infrastructure. Install entire suites or cherry-pick specific controllers directly via the automated installer.
            </p>
        </header>

        <div id="tool-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass rounded-2xl p-6 animate-pulse h-80"></div>
            <div class="glass rounded-2xl p-6 animate-pulse h-80"></div>
        </div>
    </main>

    <script>
        const BASE_DOMAIN = "https://yellowbox.itblognote.com";

        function copyToClipboard(elementId, btn) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
                btn.classList.add('bg-emerald-500/10');
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.classList.remove('bg-emerald-500/10');
                }, 2000);
            });
        }

        async function loadBinaries() {
            try {
                const res = await fetch('manifest.json');
                const data = await res.json();
                const grid = document.getElementById('tool-grid');
                grid.innerHTML = '';

                if (!data.tools || data.tools.length === 0) {
                    grid.innerHTML = '<p class="text-slate-500">No tools available yet.</p>';
                    return;
                }

                data.tools.forEach((tool, index) => {
                    const card = document.createElement('div');
                    card.className = 'glass rounded-2xl p-6 flex flex-col hover:border-white/10 transition duration-300';
                    
                    // Lấy danh sách file (lấy từ linux-amd64 làm chuẩn để render UI)
                    const files = tool.platforms['linux-amd64'] || Object.values(tool.platforms)[0] || [];
                    const isSuite = files.length > 1;
                    
                    const suiteCmdId = `cmd-suite-${index}`;
                    const suiteCommand = `curl -sSL ${BASE_DOMAIN}/scripts/install.sh | bash -s -- ${tool.name}`;

                    let uiHtml = `
                        <div class="flex items-center space-x-4 mb-6">
                            <div class="w-12 h-12 bg-blue-500/10 border border-blue-500/20 rounded-xl flex items-center justify-center text-blue-400 font-bold text-xl uppercase">
                                ${tool.name.charAt(0)}
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-white flex items-center gap-2">
                                    ${tool.name}
                                    ${isSuite ? '<span class="bg-purple-500/20 text-purple-400 text-[10px] px-2 py-0.5 rounded border border-purple-500/20 uppercase tracking-widest">Suite</span>' : ''}
                                </h3>
                                <p class="text-sm text-slate-500 mt-1">Available for: ${Object.keys(tool.platforms).join(', ')}</p>
                            </div>
                        </div>

                        <div class="mb-6">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block">
                                ${isSuite ? 'Install Entire Suite' : 'Install Tool'}
                            </label>
                            <div class="bg-black/60 border border-white/5 rounded-lg p-1.5 flex items-center justify-between group">
                                <code id="${suiteCmdId}" class="font-mono text-xs text-blue-400 pl-3 py-2 no-scrollbar overflow-x-auto whitespace-nowrap">${suiteCommand}</code>
                                <button onclick="copyToClipboard('${suiteCmdId}', this)" class="ml-2 p-1.5 rounded bg-white/5 hover:bg-white/10 text-slate-400 hover:text-white transition shrink-0" title="Copy command">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                </button>
                            </div>
                        </div>
                    `;

                    // Cài đặt Từng phần (Chỉ hiện nếu là một Suite gồm nhiều file)
                    if (isSuite) {
                        uiHtml += `
                            <div class="border-t border-white/5 pt-4 mt-auto">
                                <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3 block">Or Install Individually</label>
                                <div class="space-y-2">
                        `;
                        
                        files.forEach((file, fIndex) => {
                            const fileCmdId = `cmd-file-${index}-${fIndex}`;
                            const fileCommand = `curl -sSL ${BASE_DOMAIN}/scripts/install.sh | bash -s -- ${tool.name} ${file}`;
                            
                            uiHtml += `
                                <div class="flex items-center justify-between bg-white/5 rounded px-3 py-2 hover:bg-white/10 transition group">
                                    <span class="text-sm font-mono text-slate-300">${file}</span>
                                    <div class="flex items-center space-x-3">
                                        <code id="${fileCmdId}" class="hidden">${fileCommand}</code>
                                        <button onclick="copyToClipboard('${fileCmdId}', this)" class="text-xs flex items-center text-slate-500 hover:text-white transition">
                                            <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                            Copy Cmd
                                        </button>
                                    </div>
                                </div>
                            `;
                        });
                        
                        uiHtml += `</div></div>`;
                    }

                    card.innerHTML = uiHtml;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                document.getElementById('tool-grid').innerHTML = `
                    <div class="col-span-full bg-rose-500/10 border border-rose-500/20 rounded-xl p-6 text-center">
                        <p class="text-rose-400 font-medium">Failed to load manifest.json</p>
                        <p class="text-sm text-slate-500 mt-2">Ensure GitHub Actions has successfully run and generated the manifest.</p>
                    </div>`;
            }
        }
        
        loadBinaries();
    </script>
</body>
</html>
