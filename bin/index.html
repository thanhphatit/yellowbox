<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YellowBox Binary Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #94A3B8; }
        .font-mono { font-family: 'Fira Code', monospace; }
        .bg-grid { background-image: radial-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 1px); background-size: 32px 32px; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 10px; }
        code.scrollable { display: block; overflow-x: auto; white-space: nowrap; padding-bottom: 8px; -webkit-overflow-scrolling: touch; }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .os-active { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border-color: rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="bg-grid min-h-screen pb-24">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-4xl h-96 bg-blue-600/10 blur-[120px] pointer-events-none"></div>

    <nav class="border-b border-white/5 glass-card sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center text-white shadow-xl shadow-blue-500/20 text-lg font-bold">Y</div>
                <span class="text-xl font-bold text-white tracking-tight">YellowBox <span class="text-blue-500 font-medium">Registry</span></span>
            </div>
            <a href="../" class="text-sm font-medium hover:text-white transition-colors bg-white/5 px-4 py-2 rounded-lg border border-white/5">Back to Hub</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-16 relative">
        <header class="mb-12">
            <h1 class="text-5xl font-black text-white mb-4 tracking-tighter italic">CLI Distribution Hub</h1>
            <p class="text-slate-400 text-xl max-w-2xl leading-relaxed">
                Auto-detects platform. Supports Bash Script (Mac/Linux) and PowerShell (Windows).
            </p>
        </header>

        <div class="mb-12 relative">
            <input type="text" id="searchInput" placeholder="Search for tools or files..." 
                   class="w-full bg-slate-900/40 border border-white/10 rounded-2xl py-5 pl-6 pr-6 text-white text-lg placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500/50 shadow-inner">
        </div>

        <div id="tool-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-8"></div>
    </main>

    <script>
        const DOMAIN = "https://yellowbox.itblognote.com";
        let allTools = [];
        let toolStates = {}; // Stores state for each tool: { 'cicd-manager': { mode: 'install', os: 'unix' } }

        async function init() {
            try {
                const res = await fetch('manifest.json');
                const data = await res.json();
                allTools = data.tools;
                
                // Initialize default state for each tool
                allTools.forEach(t => {
                    toolStates[t.name] = { mode: 'install', os: 'unix' };
                });
                
                render(allTools);
            } catch (e) {
                document.getElementById('tool-grid').innerHTML = `<p class="text-rose-400 text-center col-span-full">Error: manifest.json not found.</p>`;
            }
        }

        function copy(id, btn) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const original = btn.innerHTML;
                btn.innerHTML = `<svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
                setTimeout(() => btn.innerHTML = original, 2000);
            });
        }

        // Generate the standard command based on OS and Mode
        function getCommand(toolName, fileName = null) {
            const state = toolStates[toolName];
            const isUnix = state.os === 'unix';
            const isInstall = state.mode === 'install';
            
            const scriptFile = isInstall ? 'install' : 'uninstall';
            
            if (isUnix) {
                const baseCmd = `curl -sSL ${DOMAIN}/scripts/${scriptFile}.sh | bash -s -- ${toolName}`;
                return fileName ? `${baseCmd} ${fileName}` : baseCmd;
            } else {
                // Windows PowerShell Command
                let envVars = `$env:APP_NAME='${toolName}'; `;
                if (fileName) envVars += `$env:SPECIFIC_FILE='${fileName}'; `;
                return `${envVars}irm ${DOMAIN}/scripts/${scriptFile}.ps1 | iex`;
            }
        }

        // Update UI after state changes
        function updateUI(toolName) {
            const card = document.getElementById(`card-${toolName}`);
            const state = toolStates[toolName];
            const isInstall = state.mode === 'install';

            // Update label and main command
            const label = card.querySelector('.cmd-label');
            const mainCmd = card.querySelector('.main-cmd');
            label.innerText = isInstall ? `Suite installation command (${state.os}):` : `Suite uninstallation command (${state.os}):`;
            mainCmd.innerText = getCommand(toolName);

            // Toggle warning color for uninstall
            if (!isInstall) {
                mainCmd.classList.replace('text-blue-400', 'text-rose-400');
            } else {
                mainCmd.classList.replace('text-rose-400', 'text-blue-400');
            }

            // Update sub commands (if it's a Suite)
            const subCmds = card.querySelectorAll('.sub-cmd');
            subCmds.forEach(codeEl => {
                const fileName = codeEl.dataset.file;
                codeEl.innerText = getCommand(toolName, fileName);
            });
        }

        // Switch Install / Uninstall Tab
        function switchMode(btn, toolName, mode) {
            toolStates[toolName].mode = mode;
            btn.parentElement.querySelectorAll('button').forEach(b => {
                b.classList.remove('tab-active', 'text-blue-500');
                b.classList.add('text-slate-500');
            });
            btn.classList.add('tab-active');
            btn.classList.remove('text-slate-500');
            updateUI(toolName);
        }

        // Switch OS (Mac/Linux vs Windows)
        function switchOS(btn, toolName, os) {
            toolStates[toolName].os = os;
            btn.parentElement.querySelectorAll('button').forEach(b => {
                b.classList.remove('os-active');
            });
            btn.classList.add('os-active');
            updateUI(toolName);
        }

        function render(tools) {
            const grid = document.getElementById('tool-grid');
            grid.innerHTML = '';
            tools.forEach((tool) => {
                // Determine platform (Prioritize unix files for display count, fallback to windows)
                const unixFiles = tool.platforms['linux-amd64'] || tool.platforms['darwin-arm64'] || [];
                const winFiles = tool.platforms['windows-amd64'] || [];
                const hasWindows = winFiles.length > 0;
                
                const displayFiles = unixFiles.length > 0 ? unixFiles : winFiles;
                const isSuite = displayFiles.length > 1;

                const card = document.createElement('div');
                card.id = `card-${tool.name}`;
                card.className = 'glass-card rounded-3xl p-8 flex flex-col relative';
                
                // OS Selector HTML (Only show if Windows is supported)
                const osSelector = hasWindows ? `
                    <div class="absolute top-8 right-8 flex border border-white/10 rounded-lg overflow-hidden bg-black/40 p-0.5">
                        <button onclick="switchOS(this, '${tool.name}', 'unix')" class="os-active px-3 py-1.5 text-[10px] font-bold uppercase rounded-md transition-colors flex items-center gap-1">
                            Mac/Linux
                        </button>
                        <button onclick="switchOS(this, '${tool.name}', 'win')" class="px-3 py-1.5 text-[10px] font-bold uppercase rounded-md text-slate-500 hover:text-slate-300 transition-colors flex items-center gap-1">
                            Windows
                        </button>
                    </div>
                ` : `<div class="absolute top-8 right-8 text-[10px] font-bold text-slate-500 uppercase px-3 py-1.5 border border-white/5 rounded-md bg-black/20">Unix Only</div>`;

                let componentsHtml = '';
                if (isSuite) {
                    componentsHtml = `
                    <div class="pt-6 border-t border-white/5 mt-6">
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Individual Components</p>
                        <div class="grid grid-cols-1 gap-3">
                            ${displayFiles.map(f => `
                                <div class="bg-black/40 border border-white/5 rounded-xl p-3 flex items-center justify-between group overflow-hidden">
                                    <code id="cmd-${tool.name}-${f}" class="sub-cmd font-mono text-[11px] text-slate-400 scrollable custom-scrollbar pr-4" data-file="${f}">
                                        ${getCommand(tool.name, f)}
                                    </code>
                                    <button onclick="copy('cmd-${tool.name}-${f}', this)" class="ml-2 p-1.5 rounded-lg bg-white/5 hover:bg-white/10 text-slate-500 hover:text-white transition-all shrink-0 z-10 shadow-lg">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                }

                card.innerHTML = `
                    ${osSelector}
                    <div class="flex items-center justify-between mb-8 pr-24">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 bg-blue-600/10 rounded-xl flex items-center justify-center border border-blue-600/20 text-blue-500 font-black text-xl uppercase">${tool.name.charAt(0)}</div>
                            <div>
                                <h3 class="text-xl font-bold text-white tracking-tight uppercase">${tool.name}</h3>
                                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">${displayFiles.length} Components</p>
                            </div>
                        </div>
                    </div>

                    <div class="flex space-x-6 border-b border-white/5 mb-6">
                        <button onclick="switchMode(this, '${tool.name}', 'install')" class="pb-3 text-sm font-bold tracking-widest uppercase tab-active transition-all">Install</button>
                        <button onclick="switchMode(this, '${tool.name}', 'uninstall')" class="pb-3 text-sm font-bold tracking-widest uppercase text-slate-500 hover:text-slate-300 transition-all">Uninstall</button>
                    </div>

                    <div class="flex-grow overflow-hidden flex flex-col">
                        <div>
                            <p class="cmd-label text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Suite installation command (unix):</p>
                            <div class="bg-black/60 border border-white/5 rounded-xl p-4 flex items-center justify-between group overflow-hidden">
                                <code id="cmd-main-${tool.name}" class="main-cmd font-mono text-xs text-blue-400 scrollable custom-scrollbar pr-4">
                                    ${getCommand(tool.name)}
                                </code>
                                <button onclick="copy('cmd-main-${tool.name}', this)" class="ml-4 p-2.5 rounded-xl bg-white/5 hover:bg-white/10 text-slate-400 hover:text-white transition-all shrink-0 z-10 shadow-lg">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                </button>
                            </div>
                        </div>
                        ${componentsHtml}
                    </div>
                `;
                grid.appendChild(card);
                
                // Force UI update on load to map the correct state
                updateUI(tool.name);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = allTools.filter(t => t.name.toLowerCase().includes(q) || Object.values(t.platforms).flat().some(f => f.toLowerCase().includes(q)));
            render(filtered);
        });

        init();
    </script>
</body>
</html>
