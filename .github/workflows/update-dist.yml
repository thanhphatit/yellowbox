# .github/workflows/update-dist.yml
name: Auto Update Distribution Hub

on:
  push:
    branches: [main]
    paths:
      - 'charts/*.tgz'
      - 'bin/**'

jobs:
  update-hub:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # 1. Cập nhật Helm Index
      - uses: azure/setup-helm@v4
      - name: Update Helm Index
        run: helm repo index charts/ --url https://yellowbox.itblognote.com/charts/

      # 2. Sinh Manifest cho Binaries (Cực kỳ thông minh)
      - name: Generate Binaries Manifest
        run: |
          python3 -c '
          import os, json, time
          manifest = {
              "lastUpdated": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "tools": []
          }
          bin_dir = "bin"
          for tool_name in sorted(os.listdir(bin_dir)):
              tool_path = os.path.join(bin_dir, tool_name)
              if os.path.isdir(tool_path) and not tool_name.startswith("."):
                  tool_data = {"name": tool_name, "platforms": {}}
                  for plat_name in sorted(os.listdir(tool_path)):
                      plat_path = os.path.join(tool_path, plat_name)
                      if os.path.isdir(plat_path):
                          files = [f for f in sorted(os.listdir(plat_path)) if os.path.isfile(os.path.join(plat_path, f)) and not f.startswith(".")]
                          if files:
                              tool_data["platforms"][plat_name] = files
                  if tool_data["platforms"]:
                      manifest["tools"].append(tool_data)
          with open("bin/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          '

      # 3. Commit & Push
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/index.yaml bin/manifest.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update manifests [skip ci]" && git push)