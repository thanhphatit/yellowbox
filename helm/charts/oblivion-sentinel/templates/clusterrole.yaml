{{- if and .Values.rbac.create (not .Values.rbac.clusterAdmin) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "oblivion-sentinel.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "oblivion-sentinel.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
{{- toYaml .Values.rbacResources | nindent 2 }}
{{- end }}
