apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "oblivion-sentinel.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "oblivion-sentinel.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: reaper
spec:
  schedule: {{ required "reaper.schedule must be set" .Values.reaper.schedule | quote }}
  {{- if .Values.reaper.timeZone }}
  timeZone: {{ .Values.reaper.timeZone | quote }}
  {{- end }}
  {{- with .Values.reaper.startingDeadlineSeconds }}
  startingDeadlineSeconds: {{ . }}
  {{- end }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ include "oblivion-sentinel.name" . }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: reaper
        spec:
          serviceAccountName: {{ include "oblivion-sentinel.serviceAccountName" . }}
          restartPolicy: Never
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: reaper
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              command:
                - bash
                - -lc
                - |
                  set -euo pipefail
                  /reaper/reaper.sh
              envFrom:
                - configMapRef:
                    name: {{ include "oblivion-sentinel.fullname" . }}-config
              {{- with .Values.extraEnv }}
              env:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              volumeMounts:
                - name: reaper
                  mountPath: /reaper
                  readOnly: true
              {{- with .Values.extraVolumeMounts }}
              {{- toYaml . | nindent 16 }}
              {{- end }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
          volumes:
            - name: reaper
              configMap:
                name: {{ include "oblivion-sentinel.fullname" . }}
                defaultMode: 0755
            {{- with .Values.extraVolumes }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          nodeSelector:
            {{- toYaml .Values.nodeSelector | nindent 12 }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          tolerations:
            {{- toYaml .Values.tolerations | nindent 12 }}
            