{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "oblivion-sentinel.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "oblivion-sentinel.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ if .Values.rbac.clusterAdmin }}cluster-admin{{ else }}{{ include "oblivion-sentinel.fullname" . }}{{ end }}
subjects:
  - kind: ServiceAccount
    name: {{ include "oblivion-sentinel.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
